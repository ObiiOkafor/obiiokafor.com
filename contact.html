<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stay in Touch | Obii Okafor</title>
    <link rel="stylesheet" href="./site-ui.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--page-bg-alt);
      }
      main {
        max-width: 1120px;
        margin: 0 auto;
        padding: 34px 20px 48px;
      }
      h1 {
        margin: 0;
        font-family: Georgia, serif;
        font-size: clamp(40px, 5vw, 64px);
      }
      .intro {
        margin: 10px 0 0;
        color: var(--muted);
        max-width: 780px;
        font-size: 18px;
      }
      .layout {
        margin-top: 26px;
        display: block;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
      }
      .card h2 {
        margin: 0 0 10px;
        font-family: Georgia, serif;
        font-size: 34px;
      }
      .sub {
        margin: 0 0 16px;
        color: var(--muted);
      }
      form {
        display: grid;
        gap: 12px;
      }
      label {
        font-size: 13px;
        color: var(--muted);
        display: block;
        margin-bottom: 6px;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 11px 12px;
        font: inherit;
        background: var(--surface-strong);
        color: var(--text);
      }
      textarea {
        min-height: 140px;
        resize: vertical;
      }
      .submit {
        border: 0;
        border-radius: 999px;
        background: var(--button-bg);
        color: var(--button-text);
        padding: 11px 16px;
        font: inherit;
        cursor: pointer;
        width: fit-content;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }
      .toast {
        position: fixed;
        right: 24px;
        bottom: 24px;
        max-width: 360px;
        width: calc(100% - 32px);
        padding: 14px 16px;
        border-radius: 14px;
        border: 1px solid transparent;
        box-shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
        font-size: 14px;
        line-height: 1.45;
        opacity: 0;
        transform: translateY(16px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
        z-index: 1000;
      }
      .toast.is-visible {
        opacity: 1;
        transform: translateY(0);
      }
      .toast.is-success {
        background: #1f2b20;
        border-color: rgba(95, 175, 120, 0.4);
        color: #d2ead8;
      }
      .toast.is-error {
        background: #3a2020;
        border-color: rgba(189, 59, 59, 0.3);
        color: #f2d6d6;
      }
      @media (max-width: 640px) {
        .toast {
          right: 16px;
          bottom: 16px;
          width: calc(100% - 32px);
        }
      }
      .availability {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        border-radius: 999px;
        padding: 6px 10px;
        font-size: 12px;
        border: 1px solid var(--success-border);
        background: var(--success-bg);
        color: var(--success-text);
      }
      .availability-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2e8b57;
      }
      .linkedin {
        display: inline-flex;
        text-decoration: none;
        border: 1px solid var(--button-bg);
        border-radius: 999px;
        color: var(--button-text);
        background: var(--button-bg);
        padding: 11px 16px;
        font-size: 14px;
        font-weight: 600;
      }
      .linkedin:hover {
        background: var(--button-bg-hover);
      }
    </style>
  </head>
  <body data-page="contact">
    <div class="site-shell">
      <header class="site-header">
        <a class="brand" href="./index.html" aria-label="Obii Okafor home">
          <span class="brand-mark" aria-hidden="true"><span></span><span></span></span>
        </a>
        <nav class="top-nav" aria-label="Site navigation">
          <ul>
            <li><a data-page-link="home" href="./index.html">Home</a></li>
            <li><a data-page-link="projects" href="./projects.html">Things I'm Building</a></li>
            <li><a data-page-link="press" href="./press-media.html">Press & Media</a></li>
            <li><a data-page-link="contact" href="./contact.html">Stay in Touch</a></li>
            <li><a data-page-link="book" href="./book.html">Book</a></li>
          </ul>
        </nav>
        <div class="theme-switch" aria-label="Theme switcher">
          <button class="theme-toggle" type="button" aria-label="Switch to dark mode" title="Switch to dark mode"><span aria-hidden="true">☼</span></button>
        </div>
      </header>
    </div>
    <main>
      <h1>Stay in Touch</h1>
      <p class="intro">Got something in mind? Send me a note and I'll get back to you.</p>

      <section class="layout">
        <section class="card">
          <h2>Contact Me</h2>
          <div class="availability"><span class="availability-dot"></span>Open to opportunities</div>
          <form id="contactForm" action="https://formspree.io/f/xredvnrn" method="POST">
            <div>
              <label for="name">Name</label>
              <input id="name" name="name" type="text" placeholder="Your name" />
            </div>
            <div>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@example.com" />
            </div>
            <div>
              <label for="topic">What would you like to talk about?</label>
              <select id="topic" name="topic">
                <option>Speaking Engagement</option>
                <option>Collaboration</option>
                <option>General message</option>
              </select>
            </div>
            <div>
              <label for="message">Message</label>
              <textarea id="message" name="message" placeholder="Write your message"></textarea>
            </div>
            <div class="actions">
              <button class="submit" type="submit">Send Message</button>
              <a class="linkedin" href="https://www.linkedin.com/in/obiageli-okafor" target="_blank" rel="noreferrer">Connect on LinkedIn</a>
            </div>
          </form>
        </section>
      </section>

      <footer class="site-footer">
        <div class="footer-left">
          <p>© 2026 Obii Okafor</p>
          <div class="footer-nav">
            <a href="./index.html">Home</a>
            <a href="./projects.html">Things I'm Building</a>
            <a href="./press-media.html">Press & Media</a>
            <a href="./contact.html">Stay in Touch</a>
            <a href="./book.html">Book</a>
          </div>
        </div>
        <div class="social" aria-label="Social links">
          <a href="https://www.linkedin.com/in/obiageli-okafor" target="_blank" rel="noreferrer" aria-label="LinkedIn">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.94 8.5H3.56V20h3.38V8.5Zm-1.69-4.7a1.96 1.96 0 1 0 0 3.92 1.96 1.96 0 0 0 0-3.92ZM20.44 13.4c0-3.33-1.78-4.88-4.15-4.88-1.91 0-2.76 1.05-3.24 1.79V8.5H9.67V20h3.38v-5.7c0-1.5.28-2.95 2.15-2.95 1.84 0 1.86 1.72 1.86 3.05V20h3.38v-6.6Z"/></svg>
          </a>
          <a href="https://x.com/obiiokafor1?s=21&t=R1z7tlqv8gVdBXQX9fZ9Ow" target="_blank" rel="noreferrer" aria-label="X">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.9 2H22l-6.77 7.73L23.2 22h-6.26l-4.9-6.52L6.36 22H3.25l7.25-8.3L.8 2h6.36l4.43 5.9L18.9 2Zm-1.1 18h1.73L6.27 3.9H4.42L17.8 20Z"/></svg>
          </a>

        </div>
      </footer>
    </main>
    <div id="formToast" class="toast" aria-live="polite"></div>
    <script src="./site-theme.js"></script>
    <script>
      (function () {
        const form = document.getElementById("contactForm");
        const toast = document.getElementById("formToast");
        const submitButton = form ? form.querySelector(".submit") : null;
        let toastTimer = null;

        if (!form || !toast || !submitButton) {
          return;
        }

        function showToast(message, type) {
          if (toastTimer) {
            window.clearTimeout(toastTimer);
          }

          toast.textContent = message;
          toast.className = "toast is-visible " + (type === "error" ? "is-error" : "is-success");

          toastTimer = window.setTimeout(() => {
            toast.className = "toast";
            toast.textContent = "";
          }, 4200);
        }

        form.addEventListener("submit", async function (event) {
          event.preventDefault();

          submitButton.disabled = true;
          submitButton.textContent = "Sending...";
          toast.className = "toast";
          toast.textContent = "";

          try {
            const response = await fetch(form.action, {
              method: "POST",
              body: new FormData(form),
              headers: {
                Accept: "application/json"
              }
            });

            if (!response.ok) {
              throw new Error("Form submission failed");
            }

            form.reset();
            showToast("Thank you for reaching out. I’ll be in touch soon.", "success");
          } catch (error) {
            showToast("Something went wrong just now. Please try again in a moment, or reach out on LinkedIn instead.", "error");
          } finally {
            submitButton.disabled = false;
            submitButton.textContent = "Send Message";
          }
        });
      })();
    </script>
  </body>
</html>
